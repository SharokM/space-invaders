<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Space-Invaders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <link rel="manifest" href="site.webmanifest" />
    <link rel="apple-touch-icon" href="icon.png" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="normalize.css" />

    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.5.0/css/all.css"
      integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU"
      crossorigin="anonymous"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Sans+Bartle&family=Share+Tech&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="main-title">
      <h2>SPACE INVADERS</h2>
      <div>
        <h3>Saturn Shooter I</h3>
      </div>
      <div class="dark-mode">
        <label for="modes">Too Bright?</label>
        <select name="modes" id="modes">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="premium">Retro ꗃ</option>
        </select>
      </div>
      <button id="restartButton" class="restart-button">Restart Game</button>
    </header>

    <aside id="results">
      <h2 class="score-title">Score:</h2>
      <p class="results">0</p>
    </aside>

    <div class="grid-wrapper">
      <div class="grid"></div>
      <script src="app.js" defer></script>
    </div>

    <footer>
      <div class="content-wrapper">
        <div class="contact">
          <h4>Coming Soon..</h4>
          <div class="games-container">
            <!-- DINOSAUR RUN  -->
            <div class="game-card">
              <p>Dino saur Run</p>
              <a href="" target="_blank">
                <img src="img/trex.png" alt="T-Rex Run" />
              </a>
            </div>
            <!-- RPS  -->
            <div class="game-card">
              <p>Rock Paper Cut</p>
              <a
                href="https://github.com/SharokM/rock_paper_scissors"
                target="_blank"
              >
                <img
                  src="img/people-playing-paper-rock-scissors-royalty-free.avif"
                  alt="Rock "
                />
              </a>
            </div>
            <!-- MINI DRUM KIT  -->
            <div class="game-card">
              <p>PC Drum Kit</p>
              <a
                href="https://sharokm.github.io/js-drum-kit-mini/"
                target="_blank"
              >
                <img src="img/drummy.jpg" alt="Drum Kit Game" />
              </a>
            </div>
          </div>
        </div>
        <section class="social">
          <!-- <h4>Social</h4> -->
          <div class="social-icons">
            <p>
              <a href="https://www.facebook.com">
                <i class="fab fa-facebook-f"></i>
              </a>
            </p>
            <p>
              <a href="https://www.twitter.com">
                <i class="fab fa-twitter"></i>
              </a>
            </p>
            <p>
              <a href="https://www.instagram.com/accounts/signup/phone/?hl=en">
                <i class="fab fa-instagram"></i>
              </a>
            </p>
          </div>
        </section>
      </div>

      <div class="copyright">
        <p>Copyright SM 2025 | Space Invaders</p>
      </div>
    </footer>
  </body>
</html>
